<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>Rove Admin — Prototype</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--side:#1e293b;--side2:#0f172a;--acc:#4f46e5;--acc2:#6366f1;--bg:#f1f5f9;--card:#fff;
 --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;--line:#e2e8f0;--ok:#059669;--warn:#d97706;--red:#dc2626;--gold:#c8a96e}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
/* ── login ── */
#login{position:fixed;inset:0;background:linear-gradient(135deg,#1e293b,#0f172a);display:flex;align-items:center;justify-content:center;z-index:100}
.login-card{background:#fff;border-radius:14px;padding:34px 30px;width:min(360px,90vw);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-card .eyebrow{font-size:10px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;font-weight:700}
.login-card h1{font-size:20px;margin-bottom:4px}
.login-card p{font-size:12px;color:var(--tx2);margin-bottom:18px;line-height:1.5}
.login-card input{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;text-align:center;outline:none;margin-bottom:10px}
.login-card input:focus{border-color:var(--acc)}
.login-card button{width:100%;padding:11px;border:none;border-radius:9px;background:var(--acc);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.login-card button:hover{background:var(--acc2)}
.login-note{font-size:10.5px;color:var(--tx3);margin-top:10px}
/* ── layout ── */
#app{display:none;min-height:100vh}
#app.in{display:flex}
aside{width:220px;background:var(--side);color:#cbd5e1;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .eyebrow{font-size:9px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;font-weight:700}
.brand h1{font-size:17px;color:#fff;margin-top:3px}
nav{padding:12px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;margin-bottom:2px;color:#cbd5e1}
.nav-item:hover{background:rgba(255,255,255,.06)}
.nav-item.on{background:var(--acc);color:#fff;font-weight:600}
.nav-item .ic{width:18px;text-align:center}
.side-foot{padding:14px 18px;font-size:10.5px;color:#64748b;border-top:1px solid rgba(255,255,255,.08)}
main{flex:1;min-width:0;padding:22px 26px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.topbar h2{font-size:20px}
.proto-badge{background:#fef3c7;color:#92400e;border:1px solid #fcd34d;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px}
.btn{padding:9px 16px;border:none;border-radius:8px;background:var(--acc);color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn:hover{background:var(--acc2)}
.btn.ghost{background:#fff;color:var(--tx2);border:1.5px solid var(--line)}
.btn.ghost:hover{border-color:var(--acc);color:var(--acc)}
.btn.danger{background:#fff;color:var(--red);border:1.5px solid #fecaca}
.btn.danger:hover{background:#fef2f2}
.btn.sm{padding:5px 10px;font-size:12px}
.card{background:var(--card);border-radius:12px;border:1px solid var(--line);padding:18px 20px;margin-bottom:16px}
.card h3{font-size:14px;margin-bottom:12px;color:var(--tx)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.stat .n{font-size:26px;font-weight:800;color:var(--acc)}
.stat .l{font-size:12px;color:var(--tx2);margin-top:2px}
.note{background:#eef2ff;border:1px solid #c7d2fe;color:#3730a3;border-radius:10px;padding:12px 14px;font-size:12.5px;line-height:1.6;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--tx3);padding:8px;border-bottom:2px solid var(--line);white-space:nowrap}
td{padding:8px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:hover td{background:#f8fafc}
.pthumb{width:38px;height:38px;border-radius:6px;object-fit:cover;background:var(--line);display:block}
.mono{font-variant-numeric:tabular-nums}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;background:#f1f5f9;color:var(--tx2);font-weight:600}
.tag.warn{background:#fef3c7;color:#92400e}
.search-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-row input,.search-row select{padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;outline:none;background:#fff}
.search-row input:focus,.search-row select:focus{border-color:var(--acc)}
.search-row input{flex:1;min-width:180px}
.subtabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.subtab{padding:8px 14px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-size:13px;cursor:pointer;color:var(--tx2)}
.subtab.on{background:var(--side);border-color:var(--side);color:#fff;font-weight:600}
/* ── modal ── */
#ovl{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:30px 16px;overflow:auto}
#ovl.show{display:flex}
.modal{background:#fff;border-radius:14px;width:min(760px,100%);padding:22px 24px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
.modal h3{font-size:16px;margin-bottom:14px}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-grid .full{grid-column:1/-1}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--acc)}
.fld textarea{min-height:64px;resize:vertical}
.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.modal-acts{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
/* ── toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--side);color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;transition:transform .25s;z-index:80;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px}
.foto-cell{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px}
.foto-thumb{height:118px;display:flex;align-items:center;justify-content:center;background:#f8fafc;border-radius:7px;overflow:hidden;margin-bottom:7px}
.foto-thumb img{max-width:100%;max-height:118px;object-fit:contain}
.foto-lbl{font-size:11px;color:var(--tx2);margin-bottom:5px;min-height:28px;line-height:1.3}
.foto-url{width:100%;padding:6px 8px;border:1.5px solid var(--line);border-radius:6px;font-size:11px;outline:none}
.foto-url:focus{border-color:var(--acc)}
.chk{display:flex;gap:7px;align-items:center;font-size:13px}
#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:840px){aside{width:64px}.brand h1,.nav-item span.tx,.side-foot{display:none}.grid3{grid-template-columns:1fr}.f-grid{grid-template-columns:1fr}.price-grid{grid-template-columns:repeat(2,1fr)}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

/* ═══ PRODUCTION — live backend: fetch data on login, publish on save ═══ */
const BACKEND_URL='https://script.google.com/macros/s/AKfycbyQVypvgdSOgzsd_1lCRqzWHVC8Y9JqUGMPlzAI4I4--z3x9TqfAGPnSkCtU_TpVXShhw/exec';
const LS_ATOK='rove_admin_tok';
function loginMsg(t,ok){var e=document.getElementById('loginMsg');if(e){e.textContent=t||'';e.style.color=ok?'#16a34a':'#dc2626';}}
function applyServer(resp){
 if(resp.products)DB.products=resp.products;
 if(resp.softpouch)DB.softpouch=resp.softpouch; if(resp.hardbox)DB.hardbox=resp.hardbox;
 if(resp.softbox)DB.softbox=resp.softbox; if(resp.cards)DB.cards=resp.cards;
 if(resp.services)DB.services=resp.services;
 if(resp.collateral&&resp.collateral.length)DB.collateral=resp.collateral;
 S=freshState();
 if(resp.config){
  ['USD_IDR','AUD_IDR','WG_SOFT_POUCH','WG_HARDBOX','WG_SOFTBOX','WG_THANKYOU_CARD'].forEach(function(k){if(resp.config[k]!=null)S.config[k]=resp.config[k];});
  if(resp.config.shipping)S.shipping=Object.assign(JSON.parse(JSON.stringify(SHIP_DEF)),{tariffs:JSON.parse(JSON.stringify(TARIF_DEF))},resp.config.shipping);
 }
 save();
}
function doLogin(){
 var pw=(document.getElementById('pw').value||'').trim();
 if(!pw){loginMsg('Isi passcode admin.');return;}
 loginMsg('Memuat data…',true);
 fetch(BACKEND_URL+'?t='+encodeURIComponent(pw)+'&data=1').then(function(r){return r.json();}).then(function(j){
  if(j&&j.ok===false){ localStorage.removeItem(LS_ATOK); document.getElementById('pw').value=''; throw new Error((j.error||'Passcode salah')+' — masukkan lagi.'); }
  if(!j||!j.products)throw new Error('Data kosong');
  window.__ATOKEN=pw; localStorage.setItem(LS_ATOK,pw);
  applyServer(j); enter();
 }).catch(function(e){loginMsg((''+e.message).slice(0,90));});
}
function enter(){document.getElementById('login').style.display='none';document.getElementById('app').classList.add('in');render();}
function apost(payload){var tok=window.__ATOKEN||localStorage.getItem(LS_ATOK)||'';return fetch(BACKEND_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(Object.assign({t:tok},payload))}).then(function(r){return r.json();});}
function admProg(t){var d=document.createElement('div');d.id='admProg';d.style.cssText='position:fixed;inset:0;z-index:99998;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,sans-serif';d.innerHTML='<div style="background:#fff;padding:22px 28px;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.3);text-align:center"><div class="apt" style="font-size:14px;font-weight:600;color:#0f172a">'+t+'</div><div style="margin-top:6px;font-size:12px;color:#64748b">Menyimpan ke database…</div></div>';document.body.appendChild(d);return {set:function(x){var e=d.querySelector('.apt');if(e)e.textContent=x;},done:function(){d.remove();}};}
function publishAll(){
 var tok=window.__ATOKEN||localStorage.getItem(LS_ATOK)||'';
 if(!tok){alert('Sesi berakhir — masuk lagi.');return;}
 if(!confirm('Publish SEMUA perubahan ke database live?\n\n• Products\n• Packaging & Card\n• Service\n• Config & Shipping\n\nData live akan diganti dengan data di layar ini.'))return;
 var jobs=[
  ['Products',{action:'saveProducts',rows:S.products}],
  ['Packaging & Card',{action:'saveKombinasi',data:{softpouch:S.softpouch,hardbox:S.hardbox,softbox:S.softbox,cards:S.cards}}],
  ['Service',{action:'saveServices',rows:S.services}],
  ['Foto Varian',{action:'saveCollateral',rows:S.collateral}],
  ['Config & Shipping',{action:'saveConfig',config:Object.assign({},S.config,{shipping:S.shipping})}]
 ];
 var pr=admProg('Publish 0/'+jobs.length);
 (async function(){var okc=0,errs=[];for(var i=0;i<jobs.length;i++){pr.set('Publish '+(i+1)+'/'+jobs.length+' — '+jobs[i][0]);try{var res=await apost(jobs[i][1]);if(res&&res.ok)okc++;else errs.push(jobs[i][0]+': '+((res&&res.error)||'gagal'));}catch(e){errs.push(jobs[i][0]+': '+e.message);}}pr.done();if(errs.length)alert('Sebagian gagal:\n'+errs.join('\n'));else toast('✓ Terpublish ke database ('+okc+'/'+jobs.length+' bagian)');})();
}
function resetAll(){
 var tok=window.__ATOKEN||localStorage.getItem(LS_ATOK);if(!tok)return;
 if(!confirm('Muat ulang dari database? Perubahan lokal yang belum di-Publish akan hilang.'))return;
 fetch(BACKEND_URL+'?t='+encodeURIComponent(tok)+'&data=1').then(function(r){return r.json();}).then(function(j){if(j&&j.products){applyServer(j);render();toast('Dimuat ulang dari database.');}else toast('Gagal memuat.');}).catch(function(){toast('Gagal memuat ulang.');});
}

  <div class="fld"><label>Fix Price / Qty (Rp)</label><input id="s_fix" type="number" min="0" value="${s.fix!=null?s.fix:''}"></div>
  <div class="fld"><label>Additional / Pcs (Rp)</label><input id="s_pp" type="number" min="0" value="${s.perPc!=null?s.perPc:''}"></div>
  <div class="fld full"><label>Link Foto (URL Drive)</label><input id="s_photo" value="${esc(s.photo)}"></div>
  </div><div class="modal-acts"><button class="btn ghost" onclick="closeModal()">Batal</button><button class="btn" onclick="saveSvc(${i})">Simpan</button></div>`);
}
function saveSvc(i){const g=id=>document.getElementById(id).value.trim(),nv=v=>v===''?null:parseFloat(v);
 if(!g('s_name')){alert('Nama service wajib diisi.');return;}
 const s={name:g('s_name'),fix:nv(g('s_fix')),perPc:nv(g('s_pp')),photo:g('s_photo')};
 if(i>=0)S.services[i]=s;else S.services.push(s);save();closeModal();render();toast('Service disimpan (lokal)');}
function delSvc(i){if(confirm('Hapus service "'+S.services[i].name+'"?')){S.services.splice(i,1);save();render();toast('Service dihapus (lokal)');}}

/* ── SHIPPING ── */
function shippingUI(){
 const sh=S.shipping;
 return importBar('shipping')
  +`<div class="card"><h3>Carrier — tampil di estimator?</h3>
   <div style="display:flex;gap:18px;flex-wrap:wrap">${sh.carriers.map((c,i)=>`<label class="chk"><input type="checkbox" ${c.show?'checked':''} onchange="S.shipping.carriers[${i}].show=this.checked;save()"> ${esc(c.name)}</label>`).join('')}</div>
   <div style="font-size:11.5px;color:var(--tx3);margin-top:8px">Estimator hanya menampilkan carrier yang dicentang (+ Sea Freight). Sisanya tetap ada di mesin, tersembunyi.</div></div>
  <div class="card"><h3>Tarif Indoshipping — per bracket kg (Rp/kg)</h3>
   <table style="max-width:560px"><thead><tr><th>Bracket ≤ kg</th><th>Regular</th><th>Economy</th><th></th></tr></thead><tbody>
   ${sh.tariffs.map((r,i)=>`<tr>
    <td><input style="width:90px" class="mono" type="number" step="any" value="${r[0]}" onchange="S.shipping.tariffs[${i}][0]=parseFloat(this.value)||0;save()"></td>
    <td><input style="width:120px" class="mono" type="number" value="${r[1]}" onchange="S.shipping.tariffs[${i}][1]=parseFloat(this.value)||0;save()"></td>
    <td><input style="width:120px" class="mono" type="number" value="${r[2]}" onchange="S.shipping.tariffs[${i}][2]=parseFloat(this.value)||0;save()"></td>
    <td><button class="btn danger sm" onclick="S.shipping.tariffs.splice(${i},1);save();render()">✕</button></td></tr>`).join('')}
   </tbody></table>
   <div class="modal-acts" style="justify-content:flex-start;margin-top:12px"><button class="btn ghost" onclick="S.shipping.tariffs.push([999,0,0]);save();render()">+ Tambah bracket</button></div></div>
  <div class="card"><h3>Sea Freight LCL &amp; parameter perhitungan</h3>
   <div class="f-grid">
    <div class="fld"><label>Sea — USD per CBM</label><input type="number" step="any" value="${sh.sea.usdPerCbm}" onchange="S.shipping.sea.usdPerCbm=parseFloat(this.value)||0;save()"></div>
    <div class="fld"><label>Sea — biaya tetap (USD)</label><input type="number" step="any" value="${sh.sea.fixedUsd}" onchange="S.shipping.sea.fixedUsd=parseFloat(this.value)||0;save()"></div>
    <div class="fld"><label>Sea — transit</label><input value="${esc(sh.sea.transit)}" onchange="S.shipping.sea.transit=this.value;save()"></div>
    <div class="fld"><label>Packing factor (1.10 = +10%)</label><input type="number" step="any" value="${sh.packingFactor}" onchange="S.shipping.packingFactor=parseFloat(this.value)||1;save()"></div>
    <div class="fld"><label>Divisor volumetrik — Regular</label><input type="number" value="${sh.divRegular}" onchange="S.shipping.divRegular=parseFloat(this.value)||5000;save()"></div>
    <div class="fld"><label>Divisor volumetrik — Economy</label><input type="number" value="${sh.divEconomy}" onchange="S.shipping.divEconomy=parseFloat(this.value)||6000;save()"></div>
    <div class="fld"><label>Efisiensi isi karton (0.80)</label><input type="number" step="any" value="${sh.cartonUtil}" onchange="S.shipping.cartonUtil=parseFloat(this.value)||0.8;save()"></div>
   </div></div>
  <div class="card"><h3>Ukuran karton pengiriman (cm &amp; gram)</h3>
   <table style="max-width:580px"><thead><tr><th>Ukuran</th><th>L</th><th>W</th><th>H</th><th>Berat karton (g)</th><th></th></tr></thead><tbody>
   ${sh.boxes.map((b,i)=>`<tr>
    <td><input style="width:70px" value="${esc(b.size)}" onchange="S.shipping.boxes[${i}].size=this.value;save()"></td>
    <td><input style="width:60px" class="mono" type="number" value="${b.L}" onchange="S.shipping.boxes[${i}].L=parseFloat(this.value)||0;save()"></td>
    <td><input style="width:60px" class="mono" type="number" value="${b.W}" onchange="S.shipping.boxes[${i}].W=parseFloat(this.value)||0;save()"></td>
    <td><input style="width:60px" class="mono" type="number" value="${b.H}" onchange="S.shipping.boxes[${i}].H=parseFloat(this.value)||0;save()"></td>
    <td><input style="width:90px" class="mono" type="number" value="${b.wg}" onchange="S.shipping.boxes[${i}].wg=parseFloat(this.value)||0;save()"></td>
    <td><button class="btn danger sm" onclick="S.shipping.boxes.splice(${i},1);save();render()">✕</button></td></tr>`).join('')}
   </tbody></table>
   <div class="modal-acts" style="justify-content:flex-start;margin-top:12px"><button class="btn ghost" onclick="S.shipping.boxes.push({size:'',L:0,W:0,H:0,wg:0});save();render()">+ Tambah karton</button></div></div>`;
}

/* ── FOTO VARIAN ── */
let fotoSet='collateral';
function fotoUI(){
 var items;
 if(fotoSet==='collateral')items=S.collateral.map((c,i)=>({label:c.type+' · '+c.kind+': '+c.value,url:c.photo,i:i,kind:'collateral'}));
 else items=S.services.map((s,i)=>({label:s.name,url:s.photo,i:i,kind:'service'}));
 return `<div class="subtabs">
   <div class="subtab ${fotoSet==='collateral'?'on':''}" onclick="fotoSet='collateral';render()">Packaging &amp; Card (${S.collateral.length})</div>
   <div class="subtab ${fotoSet==='service'?'on':''}" onclick="fotoSet='service';render()">Service (${S.services.length})</div></div>
  <div class="note">Foto per varian. Prototype: edit URL foto → thumbnail langsung berubah. Upload file langsung ke Google Drive menyusul di backend sungguhan.</div>
  <div class="foto-grid">${items.map(it=>`<div class="foto-cell">
   <div class="foto-thumb">${it.url?`<img loading="lazy" src="${thumbURL(it.url)}" onerror="this.style.opacity=.15">`:'<span style="color:var(--tx3);font-size:11px">tanpa foto</span>'}</div>
   <div class="foto-lbl">${esc(it.label)}</div>
   <input class="foto-url" value="${esc(it.url)}" placeholder="URL foto Drive…" onchange="setFotoUrl('${it.kind}',${it.i},this.value)"></div>`).join('')}</div>`;
}
function thumbURL(u){var m=(''+u).match(/\/file\/d\/([\w-]+)/)||(''+u).match(/id=([\w-]+)/);return m?('https://drive.google.com/thumbnail?id='+m[1]+'&sz=w200'):u;}
function setFotoUrl(kind,i,v){if(kind==='collateral')S.collateral[i].photo=v;else S.services[i].photo=v;save();render();toast('URL foto diperbarui (lokal)');}

/* ── IMPORT / EXPORT EXCEL (kalibrasi massal, pakai SheetJS) ── */
function importBar(section){
 return `<div class="card" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:#eef2ff;border-color:#c7d2fe">
  <div style="flex:1;min-width:220px;font-size:12.5px;color:#3730a3"><b>Kalibrasi massal (Excel)</b> — unduh template, ubah di Excel, lalu import untuk mengganti <b>semua</b> data ${sectionLabel(section)} sekaligus.</div>
  <button class="btn ghost sm" onclick="dlTemplate('${section}')">⬇ Unduh template (.xlsx)</button>
  <button class="btn sm" onclick="pickImport('${section}')">⬆ Import data (.xlsx)</button></div>`;
}
function sectionLabel(s){return s==='service'?'Service':s==='shipping'?'Tarif Shipping':'Packaging & Card';}
function sheetsForSection(section){
 if(section==='service')return {Service:[['name','fix','perPc','photo']].concat(S.services.map(s=>[s.name,s.fix,s.perPc,s.photo]))};
 if(section==='shipping')return {Tariff:[['bracket_kg','regular','economy']].concat(S.shipping.tariffs.map(r=>[r[0],r[1],r[2]]))};
 var out={};[['softpouch','Soft Pouch'],['hardbox','Hard Box'],['softbox','Soft Box'],['cards','Thank You Card']].forEach(function(a){
  var key=a[0],name=a[1],keys=KOMB_KEYS[key];
  out[name]=[keys.concat(KT)].concat(S[key].map(function(r){return keys.map(function(k){return r[k];}).concat((r.t||[]).map(function(x){return x==null?'':x;}));}));});
 return out;
}
function dlTemplate(section){
 if(!window.XLSX){alert('Library Excel belum termuat (butuh internet). Coba lagi sebentar.');return;}
 var sheets=sheetsForSection(section),wb=XLSX.utils.book_new();
 Object.keys(sheets).forEach(function(name){XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sheets[name]),name);});
 XLSX.writeFile(wb,'rove_'+section+'_template.xlsx');
 toast('Template diunduh — isi/ubah di Excel lalu Import.');
}
function pickImport(section){
 if(!window.XLSX){alert('Library Excel belum termuat (butuh internet).');return;}
 var inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls,.csv';
 inp.onchange=function(){var f=inp.files[0];if(!f)return;var rd=new FileReader();
  rd.onload=function(e){try{applyImport(section,XLSX.read(e.target.result,{type:'array'}));}catch(err){alert('Gagal membaca file: '+err.message);}};
  rd.readAsArrayBuffer(f);};
 inp.click();
}
function numOrNull(v){if(v===''||v==null)return null;var n=parseFloat((''+v).replace(/rp/i,'').replace(/[^\d.,-]/g,'').replace(',','.'));return isNaN(n)?null:n;}
function applyImport(section,wb){
 if(section==='service'){
  var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
  var data=rows.slice(1).filter(function(r){return r[0];}).map(function(r){return {name:''+r[0],fix:numOrNull(r[1]),perPc:numOrNull(r[2]),photo:r[3]?''+r[3]:''};});
  if(!data.length){alert('File kosong / tidak ada baris.');return;}
  if(!confirm('Ganti SEMUA '+S.services.length+' service dengan '+data.length+' service dari file ini?'))return;
  S.services=data;
 } else if(section==='shipping'){
  var rows2=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
  var data2=rows2.slice(1).filter(function(r){return r[0]!==''&&r[0]!=null;}).map(function(r){return [numOrNull(r[0])||0,numOrNull(r[1])||0,numOrNull(r[2])||0];});
  if(!data2.length){alert('Tidak ada baris tarif.');return;}
  if(!confirm('Ganti tabel tarif dengan '+data2.length+' bracket dari file?'))return;
  S.shipping.tariffs=data2;
 } else {
  var map={'Soft Pouch':'softpouch','Hard Box':'hardbox','Soft Box':'softbox','Thank You Card':'cards'};
  var staged={},applied=[];
  wb.SheetNames.forEach(function(sn){var key=map[sn];if(!key)return;var keys=KOMB_KEYS[key];
   var rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1});
   var data=rows.slice(1).filter(function(r){return r.some(function(c){return c!==''&&c!=null;});}).map(function(r){
    var o={};keys.forEach(function(k,ci){o[k]=r[ci]!=null?''+r[ci]:'';});
    o.t=KT.map(function(_,ti){return numOrNull(r[keys.length+ti]);});
    o.kombinasi=keys.map(function(k){return o[k];}).filter(Boolean).join(' ');return o;});
   staged[key]=data;applied.push(sn+': '+data.length+' baris');});
  if(!applied.length){alert('Tidak ada sheet cocok (Soft Pouch / Hard Box / Soft Box / Thank You Card).');return;}
  if(!confirm('Ganti data Packaging & Card:\n'+applied.join('\n')+'\n\nLanjutkan?'))return;
  Object.keys(staged).forEach(function(k){S[k]=staged[k];});
 }
 save();render();toast('Import selesai — data diganti (lokal)');
}

/* ── modal & toast ── */
function openModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('ovl').classList.add('show');}
function closeModal(){document.getElementById('ovl').classList.remove('show');}
document.getElementById('ovl').addEventListener('click',e=>{if(e.target.id==='ovl')closeModal();});
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}
</script>
