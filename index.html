var ITER=310000;
function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function unlock(pw){
 var parts=PAYLOAD.split('.');
 var salt=b64(parts[0]),iv=b64(parts[1]),ct=b64(parts[2]),mac=b64(parts[3]);
 var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
 var bits=new Uint8Array(await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:ITER,hash:'SHA-256'},km,512));
 var aesKey=await crypto.subtle.importKey('raw',bits.slice(0,32),{name:'AES-CBC'},false,['decrypt']);
 var hmacKey=await crypto.subtle.importKey('raw',bits.slice(32),{name:'HMAC',hash:'SHA-256'},false,['verify']);
 var data=new Uint8Array(iv.length+ct.length);data.set(iv);data.set(ct,iv.length);
 var ok=await crypto.subtle.verify('HMAC',hmacKey,mac,data);
 if(!ok)throw new Error('bad');
 var pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:iv},aesKey,ct);
 return new TextDecoder().decode(pt);
}
async function tryUnlock(){
 var pw=document.getElementById('pw').value;if(!pw)return;
 var btn=document.getElementById('go');btn.disabled=true;btn.textContent='Unlockingâ€¦';
 try{
  var html=await unlock(pw);
  try{localStorage.setItem('rove_lock_pw',pw);}catch(e){}
  document.open();document.write(html);document.close();
 }catch(e){
  btn.disabled=false;btn.textContent='Unlock';
  document.getElementById('err').textContent='Wrong passcode â€” please try again.';
  document.getElementById('pw').value='';document.getElementById('pw').focus();
 }
}
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')tryUnlock();});
(function(){try{var saved=localStorage.getItem('rove_lock_pw');if(saved){unlock(saved).then(function(html){document.open();document.write(html);document.close();}).catch(function(){try{localStorage.removeItem('rove_lock_pw');}catch(e){}});}}catch(e){}})();
