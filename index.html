function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function unlock(pw){
 var parts=PAYLOAD.split('.');
 var salt=b64(parts[0]),iv=b64(parts[1]),ct=b64(parts[2]),mac=b64(parts[3]);
 var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
 var bits=new Uint8Array(await crypto.subtle.deriveBits({name:'PBKDF2',salt:salt,iterations:ITER,hash:'SHA-256'},km,512));
 var aesKey=await crypto.subtle.importKey('raw',bits.slice(0,32),{name:'AES-CBC'},false,['decrypt']);
 var hmacKey=await crypto.subtle.importKey('raw',bits.slice(32),{name:'HMAC',hash:'SHA-256'},false,['verify']);
 var data=new Uint8Array(iv.length+ct.length);data.set(iv);data.set(ct,iv.length);
 var ok=await crypto.subtle.verify('HMAC',hmacKey,mac,data);
 if(!ok)throw new Error('bad');
 var pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:iv},aesKey,ct);
 return new TextDecoder().decode(pt);
}
